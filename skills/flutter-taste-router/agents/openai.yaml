interface:
  display_name: "Flutter Taste Router"
  short_description: "Route taste-skill family outputs into one Flutter design packet"
  default_prompt: "Use $flutter-taste-router to choose the correct taste-skill source for the current Flutter design task, always normalize the result into a textual Flutter design packet before any global or module freeze, inspect the matching shared or module directories for existing static page images, and only if images are missing then check IMAGE_BASE_URL and IMAGE_API_KEY. When both variables exist, call $gpt-image-2-generator to create page-specific app preview images, save the chosen global preview under docs/rd/, copy it into the related module directory, and fold the image evidence back into the design packet. When the variables are missing, continue with the normalized textual packet instead of blocking. Return the freeze-ready packet with platform baseline, art direction, taste constraints, state matrix, freeze scope, and handoff guardrails for the downstream Flutter workflow."
