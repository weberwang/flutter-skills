interface:
  display_name: "Flutter Taste Router"
  short_description: "Route taste-skill family outputs into one Flutter design packet"
  default_prompt: "Use $flutter-taste-router to choose the correct taste-skill source for the current Flutter design task, always normalize the result into a textual Flutter design packet before any global or module freeze, inspect the matching shared or module directories for existing static page images, and only if images are missing then check IMAGE_BASE_URL and IMAGE_API_KEY. Shared/global freeze requires approved effect images: when both variables exist, call $gpt-image-2-generator to create no more than 3 light-mode global app preview images, save the chosen global preview under docs/rd/, copy it into the related module directory, and fold the image evidence back into the design packet. Every image-generation request must explicitly carry the current style constraints from the design packet, including art direction, taste constraints, visual system, CTA posture, palette direction, typography mood, component family cues, and image treatment when available. If shared/global visuals are still missing and the variables are unavailable, return blocked instead of pretending the packet is ready for global freeze. Module freeze may still continue from a sufficiently explicit textual packet, but the packet must include `high_fidelity_visual_contract` as the first freeze concern; block or return a revision plan when visual fidelity is vague or deferred to implementation polish. Module-stage previews must not be generated by default; only generate them when the workflow explicitly enables `--perviewer`, and when that happens, record the opt-in plus generated module preview paths into `global-design-guidelines.md`. Module previews must inherit the approved global style system instead of redefining a new one. Return the freeze-ready packet with platform baseline, art direction, taste constraints, high-fidelity visual contract, state matrix, freeze scope, style-generation constraints, and handoff guardrails for the downstream Flutter workflow."
