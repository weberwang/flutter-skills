interface:
  display_name: "GPT Image 2 Generator"
  short_description: "Generate local images through custom gpt-image-2 API"
  default_prompt: "Use $gpt-image-2-generator only when the user explicitly asks for `gpt-image-2`, `imag2`, or this skill itself. Generate one or more local images with gpt-image-2 through a custom base URL and API key loaded from environment variables. This skill stays on the image generation endpoint rather than the image edit endpoint, and it may also run image-to-image requests by sending reference images through `image_urls` as base64 data-URI entries. In the Flutter workflow, this skill must not be treated as the default generation path: only after the upstream workflow explicitly selected `gpt-image-2` / `imag2` for the post-confirmation generation step or an explicit generation-based transparency retry may it proceed; if the representative local sketch has not been generated and confirmed yet, return control so local `$imagegen` can run first. When you do generate Flutter workflow images, generate light-mode page-specific app preview images, save them to explicit shared or module paths using the corresponding page names, and do not send a live request when IMAGE_BASE_URL or IMAGE_API_KEY is missing. For shared/global design freeze, generate no more than 3 previews in one cycle. Do not generate new module-stage previews during refinement or module freeze unless the upstream workflow explicitly approved that evidence path. For prompt-only transparency repair, use prompt text exactly `移除背景` and pass the current image back through `image_urls`. Always write inherited style constraints into the generation input: art direction, visual_system, cta_posture, palette direction, typography mood, component family cues, and image treatment when available."
