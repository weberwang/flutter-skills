interface:
  display_name: "GPT Image 2 Generator"
  short_description: "Generate local images through custom gpt-image-2 API"
  default_prompt: "Use $gpt-image-2-generator to generate one or more local images with gpt-image-2 through a custom base URL and API key loaded from environment variables. In the Flutter workflow, this skill owns only the post-confirmation final effect-image step: if the representative local sketch has not been generated and confirmed yet, return control so local `$imagegen` can run first. When you do generate Flutter workflow images, generate light-mode page-specific app preview images, save them to explicit shared or module paths using the corresponding page names, and do not send a live request when IMAGE_BASE_URL or IMAGE_API_KEY is missing. For shared/global design freeze, generate no more than 3 previews in one cycle. Do not generate new module-stage previews during refinement or module freeze unless the upstream workflow explicitly approved that evidence path. Always write inherited style constraints into the generation input: art direction, visual_system, cta_posture, palette direction, typography mood, component family cues, and image treatment when available."
