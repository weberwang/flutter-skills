interface:
  display_name: "Flutter Workflow"
  short_description: "Route two-phase Flutter delivery with Pencil as the default frozen design source"
  default_prompt: "Use $flutter-workflow to initialize or update orchestrator-owned workflow state, and only persist runtime workflow artifacts when the current run really needs them. This workflow now has two phases: `launchable_native_freeze` and `premium_experience_freeze`. Both phases must follow the same core chain: prototype -> effect image -> Pencil design source -> design freeze -> Pencil-to-Flutter restoration -> asset-enhancement resolution -> implementation. Unless the user explicitly overrides the design-source branch, default to `pencil_mcp_design_source_branch`. Do not treat prototypes or effect images as the final frozen design source. Freeze the confirmed Pencil design source instead, and restore Flutter code from that frozen Pencil design source. In both phases, asset-enhancement resolution is mandatory: classify regions as `flutter_native`, `atlas_required`, or `placeholder_only`, and when any region is `atlas_required`, complete atlas analysis, atlas generation, background processing, slicing, and asset integration before implementation proceeds. In Phase 1, produce an App Store / Play Store-ready launch version using stable native Flutter implementation, required launch states, a launch Pencil freeze, and launch asset-enhancement resolution. In Phase 2, upgrade a launchable product through a premium prototype, high-fidelity effect image, premium Pencil design source, premium visual freeze, restoration, premium asset-enhancement resolution, blueprinting, implementation upgrade, and parity QA. If a premium change request rewrites core task path, primary CTA goal, page flow, required state semantics, or module ownership, trigger `scope_reopen` instead of continuing as a normal premium enhancement. Use `effect-image-to-pencil-design` for Pencil design-source generation, `pencil-design-to-flutter-restoration` for Pencil-backed restoration, `flutter-design-freeze-gate` for freeze checks, `flutter-uiux-to-architecture` for display restoration blueprints, `flutter-design-parity-reviewer` for premium parity review, `flutter-init` for project initialization, `flutter-rd-module-splitter` for module scope work, and `flutter-prd-rd-writer` for technical baseline generation. Prefer `fvm flutter` and `fvm dart` unless the user explicitly overrides the toolchain contract. Unless the user explicitly requests another language for a specific artifact, all workflow output artifacts must use Simplified Chinese for human-readable content."
