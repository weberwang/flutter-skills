interface:
  display_name: "Flutter Workflow"
  short_description: "Route Flutter stages and keep one workflow record"
  default_prompt: "Use $flutter-workflow to initialize or update orchestrator-owned workflow state, and only persist runtime workflow artifacts when the current run really needs them. Route Flutter work through raw requirements intake, requirements brainstorming, PRD document generation, PRD/RD, global technical baseline generation, `@product-design` brief confirmation, final design direction confirmation, `DESIGN.md` output, shared freeze, early project initialization, bootstrap code generation, module impl.md generation, mandatory native `HTML/CSS/JS` static module prototype confirmation, module final effect-image generation, implementation-stage atlas preparation, atlas slicing, display-evidence-pack confirmation, mandatory module Pencil design-source generation, post-review module image-asset generation for every module page in the visual-enhancement branch, module design freeze, `pencil-design-to-flutter-restoration`, architecture, display restoration blueprint readiness, implementation readiness, code implementation, `flutter_render_vs_frozen_design_qa`, `@product-design` design QA, and human visual inspection handoff. Unless the user explicitly requests another language for a specific artifact, all workflow output artifacts must use Simplified Chinese for human-readable content. Read the orchestrator references as needed: requirements-prd-flow for raw demand to PRD, prd-template for the canonical PRD shape, prd-completeness-gate before promoting `prd_ready`, prd-handoff-map for downstream consumer checks, creative-production-branch for asset-branch routing, workflow-record-contract for optional runtime-state persistence, control-contracts for route locks/preflight/receipts/delegation, execution-modes for --auto, workflow-states for stage classification, routing-rules for next-skill decisions, hard-rules for gates, and pressure-scenarios for skip-gate requests. Keep shared and module final effect-image artifacts under docs/project, require atlas preparation to run through `$effect-image-to-ui-sheet-atlas`, require atlas slicing to run through `$ui-sheet-atlas-slicer`, require every final effect-image generation request to first extract applicable visual constraints from the frozen global design packet, require final effect images to preserve the frozen design width and use the frozen viewport height as the minimum logical height while allowing taller outputs for intentional scrollable content, require final effect-image requests to carry the frozen `image_output_scale` so the workflow output size is derived from the logical viewport instead of reusing viewport pixels as output pixels, require every generated workflow image to pass one automatic `@product-design` QA review before confirmation or downstream consumption, default the Flutter environment contract to `fvm` unless the user explicitly overrides it, prefer `fvm flutter` and `fvm dart` in initialization/bootstrap/validation/implementation guidance, require all module-related workflow to stay behind the shared/global design freeze, require the shared/global freeze packet to cover only the shared theme system, shared public shell, shared public component families, and shared interaction principles without any page design, require module impl.md generation to follow the frozen shared design and interaction principles, require the module native prototype stage to use only plain `HTML`, `CSS`, and `JavaScript` with no framework, to stay static-page only, to use Simplified Chinese visible UI copy by default unless the user explicitly overrides the display language, and to read as a mature commercial product surface instead of a marketing page, ad-style mock, or explanation-heavy draft, require the confirmed native HTML prototype before atlas preparation, require atlas preparation to start only after the corresponding final effect image is confirmed, require atlas preparation to analyze the confirmed effect image plus its prompt and generate one transparent `gpt-image-2-generator` atlas that contains only non-standard-library visuals, require exportable atlas visuals to live in non-overlapping rectangular cells, require atlas preparation confirmation before atlas slicing, require atlas slicing before Pencil design execution, require accepted atlas bundles to behave as standard runtime-oriented resource atlases whose slice outputs may be used directly by the app when they are marked runtime-ready, require image-generation retries to preserve the full original prompts plus frozen constraints instead of simplifying them, delete obsolete non-selected effect images after freeze so stale directions cannot affect later routing, and close alternative-direction browsing unless the user explicitly restarts the cycle, use `Creative Production` only as a direction-input branch before confirmation or an asset-oriented branch after `DESIGN.md`, require Pencil design execution through MCP with compare-confirm-fix-human-acceptance before any new bitmap scope is finalized, require the later visual-enhancement branch to process every in-scope module page one by one for runtime-asset normalization, global-catalog reuse checks, post-review bitmap list confirmation, and standalone `Product Design:ideate` generation beyond accepted atlas-slice outputs, normalize downstream freeze packets from approved image-backed design artifacts when needed, treat high-fidelity visual fidelity as the first module design-freeze priority, require `pencil_restoration_ready` plus `display_restoration_blueprint_ready` before implementation entry, require project initialization and bootstrap preparation to start as soon as the shared freeze and shared bootstrap-critical baseline allow, require the PRD completeness gate to pass before `prd_ready`, and require `--auto` to run the full workflow through module implementation completion unless a blocker appears."
