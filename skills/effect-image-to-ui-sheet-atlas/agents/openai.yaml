interface:
  display_name: "Effect Image To UI Sheet Atlas"
  short_description: "Analyze page visuals, then generate a confirmed solid-background atlas bundle"
  default_prompt: "Use $effect-image-to-ui-sheet-atlas when a shared or module page must produce one confirmed final effect image together with one solid-background UI-only atlas bundle before later background removal, slicing, design, or implementation work continues. Treat this skill as the visual-asset preparation node only: first analyze the confirmed effect image plus its prompt, identify the UI-layer visuals that Flutter standard widgets cannot faithfully restore, exclude flutter-native regions and dynamic-data-generated regions, and produce a precomputed atlas extraction analysis with explicit rectangular cell bounds and restore bounds. In manual mode, stop for analysis confirmation before atlas generation. Only after that confirmed analysis, choose one least-conflicting flat background-key color from the preset atlas background palette, generate one solid-background rectangular-cell non-overlapping atlas through the fixed atlas prompt template, QA that atlas, and write both the atlas manifest and the atlas slicing config for downstream background removal and minimum-cell slicing. Do not ask the image model to decide which UI layers belong in the atlas or which background color to use. Background removal does not happen in this skill: after the solid atlas is confirmed, route to $imagegen for transparency removal, confirm that transparentized result, and only then continue into deterministic minimum-cell slicing."
