interface:
  display_name: "Effect Image To UI Sheet Atlas"
  short_description: "Generate a confirmed effect image plus atlas bundle"
  default_prompt: "Use $effect-image-to-ui-sheet-atlas when a shared or module page must produce one confirmed final effect image together with a UI-only transparent atlas, atlas manifest, and atlas slicing config before the workflow can enter a separate slicing stage. Treat this skill as the atlas-preparation node only: analyze the confirmed effect image plus its prompt, identify only the non-Flutter-standard visuals, rewrite them through the fixed atlas prompt template, generate one transparent rectangular-cell atlas with no overlapping exportable visuals, and if the generated atlas background is still not transparent, send that atlas image back through $gpt-image-2-generator edit fallback to remove the background while preserving the cell layout. Then create the matching manifest and config, run the required automatic @product-design QA on the generated image, and stop for atlas-bundle confirmation in manual mode before slicing."
