interface:
  display_name: "Flutter UIUX To Architecture"
  short_description: "Map frozen UI/UX design sources into Flutter architecture"
  default_prompt: "Use $flutter-uiux-to-architecture to translate frozen Flutter UI/UX RD, implementation RD, image-backed design constraints, theme artifacts, visual evidence, and structured module design-source packets into Flutter tokens, assets, component decomposition, screen architecture, state architecture, implementation boundaries, and a native-vs-bitmap decision for visually complex effects. Produce a concrete display-layer decision table that covers scroll, list, layout, sticky, and asset decisions for each important page region. Do not let preview images alone decide Flutter implementation strategy; combine preview evidence with `ui-ux.md`, `impl.md`, documented interaction semantics, and the frozen Pencil design source. When a visual cannot be reproduced natively in Flutter with reasonable fidelity and cost, record it as a project asset fallback instead of forcing a code-only rebuild."
