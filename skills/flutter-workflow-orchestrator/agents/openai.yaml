interface:
  display_name: "Flutter Workflow Orchestrator"
  short_description: "Route Flutter stages and keep one workflow record"
  default_prompt: "Use $flutter-workflow-orchestrator to initialize or update orchestrator-owned workflow state, and only persist runtime workflow artifacts when the current run really needs them. Route Flutter work through raw requirements intake, requirements brainstorming, PRD document generation, PRD/RD, global technical baseline generation, executable module impl.md generation, global visual design brainstorming, direct confirmation or subagent-recommended confirmation of the final design direction, `DESIGN.md` output, optional light-mode effect-image evidence, Stitch or Pencil structured design-source generation or validation, shared freeze, module design freeze, architecture, initialization, bootstrap code generation, implementation readiness, and human visual inspection handoff. Read the orchestrator references as needed: requirements-prd-flow for raw demand to PRD, stitch-design-source or pencil-design-source for the selected structured design-source adapter, workflow-record-contract for optional runtime-state persistence, control-contracts for route locks/preflight/receipts/delegation, execution-modes for --auto and --perviewer, workflow-states for stage classification, routing-rules for next-skill decisions, hard-rules for gates, and pressure-scenarios for skip-gate requests. Preserve the default light-mode effect-image baseline when images are generated, keep those visual artifacts under docs/rd, require executable module impl.md generation immediately after the technical baseline so downstream shared visual direction and freeze decisions stay grounded in module implementation intent, require global visual design brainstorming before product direction confirmation, require `DESIGN.md` before structured design-source work, normalize design packets through $flutter-taste-router before freeze, treat high-fidelity visual fidelity as the first module design-freeze priority, require bootstrap code to land after project initialization and before implementation entry, and require implementation entry to pass through @superpowers Spec then @superpowers Plan before any execution with flutter-dev. Never store literal Stitch API keys in repo docs, and never let --auto cross into code implementation."
