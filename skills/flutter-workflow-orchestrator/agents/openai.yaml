interface:
  display_name: "Flutter Workflow Orchestrator"
  short_description: "Route Flutter stages and keep one workflow record"
  default_prompt: "Use $flutter-workflow-orchestrator to initialize or update orchestrator-owned workflow state, and only persist runtime workflow artifacts when the current run really needs them. Route Flutter work through raw requirements intake, requirements brainstorming, PRD document generation, PRD/RD, global technical baseline generation, global visual design brainstorming, final product design direction confirmation, all-page light-mode effect-image generation, shared freeze, Stitch structured design-source generation or validation, executable module impl.md generation, module design freeze, architecture, initialization, bootstrap code generation, implementation readiness, and human visual inspection handoff. Read the orchestrator references as needed: requirements-prd-flow for raw demand to PRD, stitch-design-source for effect images to the only structured design source with frozen stitch_project_mode, frozen stitch_project_id, page-scoped Stitch subagents capped at 6 parallel designs, and modelId=GEMINI_3_1_PRO, workflow-record-contract for optional runtime-state persistence, control-contracts for route locks/preflight/receipts/delegation, execution-modes for --auto and --perviewer, workflow-states for stage classification, routing-rules for next-skill decisions, hard-rules for gates, and pressure-scenarios for skip-gate requests. Preserve the default light-mode effect-image baseline, require approved effect images for every page before shared/global freeze, keep those visual artifacts under docs/rd, require global visual design brainstorming before product direction confirmation, normalize design packets through $flutter-taste-router before freeze, treat high-fidelity visual fidelity as the first module design-freeze priority, require bootstrap code to land after project initialization and before implementation entry, and require implementation entry to pass through @superpowers Spec then @superpowers Plan before any execution with flutter-dev. Avoid Pen/Pencil unless explicitly requested, never store literal Stitch API keys in repo docs, and never let --auto cross into code implementation."
