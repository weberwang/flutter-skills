interface:
  display_name: "Flutter Workflow Orchestrator"
  short_description: "Route Flutter stages and keep one workflow record"
  default_prompt: "Use $flutter-workflow-orchestrator to initialize or update docs/rd/00-workflow-record.md, route Flutter work through global technical baseline, taste-first shared design direction via $flutter-taste-router, module UI/UX refinement, static-preview freezing through $flutter-design-freeze-gate, $flutter-uiux-to-architecture planning, flutter-init project scaffolding, implementation guardrails, and review gates. If the invocation includes --auto, auto-confirm all downstream workflow transitions and status updates until every module is implementation-ready, stop before implementing, and whenever static mobile visual evidence is required but missing, automatically call $gpt-image-2-generator to generate exactly 3 app preview images before continuing. Do not require Pen or Pencil in the default workflow."
