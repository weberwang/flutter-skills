interface:
  display_name: "Flutter Workflow Orchestrator"
  short_description: "Route Flutter stages and keep one workflow record"
  default_prompt: "Use $flutter-workflow-orchestrator to initialize or update orchestrator-owned workflow state, and only persist runtime workflow artifacts when the current run really needs them. Route Flutter work through raw requirements intake, requirements brainstorming, PRD document generation, PRD/RD, global technical baseline generation, `@product-design` brief confirmation, reference-image-backed representative sketch generation through local `$imagegen`, final design direction confirmation from the approved sketch, representative final effect-image generation through `gpt-image-2-generator`, `DESIGN.md` output, mandatory shared Pencil design-source generation, post-review shared image-asset generation when still required, shared freeze, early project initialization, bootstrap code generation, module impl.md generation, module design freeze, implementation-stage module effect-image generation, display-evidence-pack confirmation, mandatory module Pencil design-source generation, post-review module image-asset generation when still required, `pencil-design-to-flutter-restoration`, architecture, display restoration blueprint readiness, implementation readiness, code implementation, `flutter_render_vs_frozen_design_qa`, `@product-design` design QA, and human visual inspection handoff. Read the orchestrator references as needed: requirements-prd-flow for raw demand to PRD, prd-template for the canonical PRD shape, prd-completeness-gate before promoting `prd_ready`, prd-handoff-map for downstream consumer checks, creative-production-branch for asset-branch routing, workflow-record-contract for optional runtime-state persistence, control-contracts for route locks/preflight/receipts/delegation, execution-modes for --auto, workflow-states for stage classification, routing-rules for next-skill decisions, hard-rules for gates, and pressure-scenarios for skip-gate requests. Keep shared and module final effect-image artifacts under docs/project, save representative sketches with a `-draft` suffix beside the final page artifacts, require every representative-sketch and final effect-image generation request to first extract applicable visual constraints from the frozen global design packet, require representative sketches to be produced through local `$imagegen`, require final effect images to preserve the frozen design width and use the frozen viewport height as the minimum height while allowing taller outputs for intentional scrollable content, default the Flutter environment contract to `fvm` unless the user explicitly overrides it, prefer `fvm flutter` and `fvm dart` in initialization/bootstrap/validation/implementation guidance, require all module-related workflow to stay behind the shared/global design freeze, require the shared/global freeze packet to cover only the shared theme system, shared public shell, shared public component families, and shared interaction principles without any page design, require module impl.md generation to follow the frozen shared design and interaction principles, require implementation-stage module effect-image generation before display-evidence-pack confirmation and mandatory Pencil design execution, require `@product-design` brief confirmation before representative sketch generation, require the representative sketch to be confirmed before downstream direction freeze and before `gpt-image-2-generator` is called for the representative final effect image, freeze that confirmed representative final effect image as the visual baseline for the current design cycle, delete obsolete non-selected sketches and effect images after freeze so stale directions cannot affect later routing, and close alternative-direction browsing unless the user explicitly restarts the cycle, use `Creative Production` only as a direction-input branch before confirmation or an asset-oriented branch after `DESIGN.md`, require Pencil design execution through MCP with compare-confirm-fix-human-acceptance before any new bitmap scope is finalized, require each approved bitmap asset to be generated as its own file through `$imagegen`, normalize downstream freeze packets from approved image-backed design artifacts when needed, treat high-fidelity visual fidelity as the first module design-freeze priority, require `pencil_restoration_ready` plus `display_restoration_blueprint_ready` before implementation entry, require project initialization and bootstrap preparation to start as soon as the shared freeze and shared bootstrap-critical baseline allow, require the PRD completeness gate to pass before `prd_ready`, and require `--auto` to run the full workflow through module implementation completion unless a blocker appears."
