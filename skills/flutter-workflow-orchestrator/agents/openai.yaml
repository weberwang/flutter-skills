interface:
  display_name: "Flutter Workflow Orchestrator"
  short_description: "Route Flutter stages and keep one workflow record"
  default_prompt: "Use $flutter-workflow-orchestrator to initialize or update docs/rd/00-workflow-record.md, route Flutter work through global technical baseline, taste-first shared design direction via $flutter-taste-router, mandatory taste-router text normalization before shared or module freeze, directory-first static-visual intake, paired module `ui-ux.md` and `impl.md` refinement, $flutter-design-freeze-gate, $flutter-uiux-to-architecture planning, flutter-init project scaffolding, and implementation guardrails. All workflow preview images must use light mode unless the user explicitly overrides that requirement. If a freeze needs static visuals, check the matching directories first; if visuals are missing, check IMAGE_BASE_URL and IMAGE_API_KEY, generate missing page-specific app preview images through $gpt-image-2-generator only when both variables exist, save the chosen global preview under docs/rd/ and copy it into the owning module directory, otherwise continue without blocking. Module refinement and code landing must be strictly invoked through @superpowers; do not directly route those execution steps to flutter-dev, project-local implementation skills, or other standalone execution paths. Prefer triggering flutter-init as soon as the shared bootstrap-critical baseline is clear enough, before feature-module code begins, rather than waiting for every feature module to reach late-stage architecture output. Flutter-init must stop at initialization boundaries: scaffold, shared bootstrap, shared wiring, annotation-ready contracts, and project-local skill generation only; it must not implement feature code, page code, or module-specific business logic. Before a feature module starts implementation, verify that the required global public code baseline is already landed: app bootstrap and environment init, root router or route host plus redirect policy, global DI or provider scope entry, storage baseline, global error and logging baseline, required shared theme or design-token baseline, and any required app-shell or root-shell. Add network baseline and API client wiring only when the project or target modules actually require remote data or other network capabilities. Before display-layer code begins, require a readiness preflight: readable main preview, detail previews when needed, explicit scroll/list/overlay/layout/sticky semantics in `ui-ux.md`, and a concrete display-layer decision table from $flutter-uiux-to-architecture. During implementation, prefer minimum data contract first, then display-layer landing, then real data integration for ordinary business-page modules; allow infrastructure-heavy modules to lead with the minimum process or data layer. Display-layer code must inspect the corresponding page image through $image-to-code before landing when such image evidence exists, but preview images must not be the only source of truth for final Flutter widget choices. If the effect image includes visuals that Flutter cannot reproduce natively with reasonable fidelity, route those bitmap needs through $imagegen, move the selected asset into the project, and consume that asset explicitly. If the invocation includes --auto, auto-confirm all downstream workflow transitions and status updates until every module is implementation-ready, then stop before implementing. Do not require Pen or Pencil in the default workflow."
