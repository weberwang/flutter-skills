interface:
  display_name: "Flutter Workflow Orchestrator"
  short_description: "Route Flutter stages and keep one workflow record"
  default_prompt: "Use $flutter-workflow-orchestrator to initialize or update docs/rd/00-workflow-record.md, route Flutter work through global technical baseline, taste-first shared design direction via $flutter-taste-router, mandatory taste-router text normalization before shared or module freeze, directory-first static-visual intake, paired module `ui-ux.md` and `impl.md` refinement, $flutter-design-freeze-gate, $flutter-uiux-to-architecture planning, flutter-init project scaffolding, and implementation guardrails. If a freeze needs static visuals, check the matching directories first; if visuals are missing, check IMAGE_BASE_URL and IMAGE_API_KEY, generate missing page-specific app preview images through $gpt-image-2-generator only when both variables exist, save the chosen global preview under docs/rd/ and copy it into the owning module directory, otherwise continue without blocking. Module refinement and code landing must run through @superpowers. During implementation, prefer minimum data contract first, then display-layer landing, then real data integration for ordinary business-page modules; allow infrastructure-heavy modules to lead with the minimum process or data layer. Display-layer code must inspect the corresponding page image through $image-to-code before landing when such image evidence exists. If the effect image includes visuals that Flutter cannot reproduce natively with reasonable fidelity, route those bitmap needs through $imagegen, move the selected asset into the project, and consume that asset explicitly. If the invocation includes --auto, auto-confirm all downstream workflow transitions and status updates until every module is implementation-ready, then stop before implementing. Do not require Pen or Pencil in the default workflow."
