interface:
  display_name: "Flutter Workflow Orchestrator"
  short_description: "Route Flutter stages and keep one workflow record"
  default_prompt: "Use $flutter-workflow-orchestrator to initialize or update orchestrator-owned workflow state, and only persist runtime workflow artifacts when the current run really needs them. Route Flutter work through raw requirements intake, requirements brainstorming, PRD document generation, PRD/RD, global technical baseline generation, `@product-design` brief confirmation, `@product-design` visual-direction recommendation, an optional pre-direction Creative Production exploration pass when richer creative evidence is needed, final design direction confirmation, `DESIGN.md` output, an optional post-direction Creative Production asset branch for commercial creative exploration / production / polish when the request is asset-oriented, optional light-mode effect-image evidence, Stitch or Pencil structured design-source generation or validation, shared freeze, early project initialization, bootstrap code generation, module impl.md generation, module page component design drafting, module design freeze, architecture, implementation readiness, code implementation, `@product-design` design QA, and human visual inspection handoff. Read the orchestrator references as needed: requirements-prd-flow for raw demand to PRD, prd-template for the canonical PRD shape, prd-completeness-gate before promoting `prd_ready`, prd-handoff-map for downstream consumer checks, creative-production-branch for asset-branch routing, stitch-design-source or pencil-design-source for the selected structured design-source adapter, workflow-record-contract for optional runtime-state persistence, control-contracts for route locks/preflight/receipts/delegation, execution-modes for --auto and --preview, workflow-states for stage classification, routing-rules for next-skill decisions, hard-rules for gates, and pressure-scenarios for skip-gate requests. Preserve the default light-mode effect-image baseline when images are generated, keep those visual artifacts under docs/project, require all module-related workflow to stay behind the shared/global design freeze, require module impl.md generation to follow the frozen shared design and interaction principles, require module page component drafts to wait until impl.md has fixed the module function and key states, require `@product-design` brief confirmation plus direction recommendation before product direction confirmation, require `DESIGN.md` before structured design-source work, use `Creative Production` only as a direction-input branch before confirmation or an asset-oriented branch after `DESIGN.md`, use $flutter-taste-router only for downstream textual normalization when freeze packets need it, treat high-fidelity visual fidelity as the first module design-freeze priority, require project initialization and bootstrap preparation to start as soon as the shared freeze and shared bootstrap-critical baseline allow, require the PRD completeness gate to pass before `prd_ready`, require `--auto` to run the full workflow through module implementation completion unless a blocker appears, and in `--auto` generate effect images only when `--preview` is present. Never store literal Stitch API keys in repo docs."
