interface:
  display_name: "Flutter Visual Enhancement Branch"
  short_description: "Own the later atlas, Pencil reinforcement, and bitmap refinement branch"
  default_prompt: "Use $flutter-visual-enhancement-branch when first-pass Flutter implementation is already complete but review still proves that native restoration is insufficient, so the workflow must open the later visual-enhancement branch for one active module. This skill owns the branch-local sequencing for atlas analysis, solid-background atlas generation through `Product Design:ideate`, optional `$imagegen` transparency removal, deterministic `ui-sheet-atlas-slicer` cutting, `display_evidence_pack_ready` confirmation, Pencil reinforcement, global asset-catalog reuse checks, post-review bitmap list confirmation, and standalone supplemental bitmap generation through `Product Design:ideate`. `flutter-workflow` may decide when the branch opens and may persist the returned stage updates, but it should not micromanage the branch-local order."
